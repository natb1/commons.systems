name: budget-etl release

on:
  push:
    tags:
      - "budget-etl-v*"

permissions:
  contents: write # required to create / update the release

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: budget-etl/go.mod
      - name: Build binary
        working-directory: budget-etl
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o "budget-etl-${{ matrix.goos }}-${{ matrix.goarch }}" .
      - name: Attach to release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          files: budget-etl/budget-etl-${{ matrix.goos }}-${{ matrix.goarch }}
