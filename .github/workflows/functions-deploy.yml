name: Functions — Deploy

on:
  push:
    branches: [main]
    paths:
      - "functions/**"

permissions:
  contents: read

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install function dependencies
        run: npm ci
        working-directory: functions
      - name: Build functions
        run: npm run build
        working-directory: functions
      - name: Authenticate with Firebase
        run: |
          CREDS_FILE=$(mktemp --suffix=.json)
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$CREDS_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS_FILE" >> "$GITHUB_ENV"
          echo "CREDS_FILE=$CREDS_FILE" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> "$GITHUB_ENV"
      - name: Deploy functions
        run: npx firebase-tools deploy --only functions --project "$FIREBASE_PROJECT_ID"
      - name: Cleanup credentials
        if: always()
        run: rm -f "$CREDS_FILE"
