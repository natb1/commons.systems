name: Landing — PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "landing/**"
      - "authutil/**"
      - "firebaseutil/**"
      - "firestoreutil/**"
      - "style/**"
      - ".claude/skills/ref-pr-workflow/scripts/**"
      - "firebase.json"
      - "firestore.rules"

permissions:
  contents: read
  pull-requests: write

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: "temurin"
          java-version: "21"
      - name: Run acceptance tests
        env:
          VITE_GITHUB_BRANCH: ${{ github.head_ref }}
        run: .claude/skills/ref-pr-workflow/scripts/run-acceptance-tests.sh landing

  preview-deploy:
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Authenticate with Firebase
        run: |
          CREDS_FILE=$(mktemp --suffix=.json)
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$CREDS_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS_FILE" >> "$GITHUB_ENV"
          echo "CREDS_FILE=$CREDS_FILE" >> "$GITHUB_ENV"
      - name: Deploy to preview channel
        id: deploy
        env:
          VITE_GITHUB_BRANCH: ${{ github.head_ref }}
        run: |
          set -o pipefail
          OUTPUT=$(.claude/skills/ref-pr-workflow/scripts/run-preview-deploy.sh landing "pr-${{ github.event.pull_request.number }}" | tee /dev/stderr)
          PREVIEW_URL=$(echo "$OUTPUT" | grep '^PREVIEW_URL=' | cut -d= -f2-)
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL on PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "Preview deployed: ${{ steps.deploy.outputs.preview_url }}"
      - name: Cleanup credentials
        if: always()
        run: rm -f "$CREDS_FILE"

  smoke-tests:
    needs: preview-deploy
    if: needs.preview-deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Run smoke tests
        run: .claude/skills/ref-pr-workflow/scripts/run-smoke-tests.sh landing "${{ needs.preview-deploy.outputs.preview_url }}"
