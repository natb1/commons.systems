name: Nix Flake Check

on:
  push:
    branches-ignore:
      - main
    paths:
      - "nix/**"
      - "flake.nix"
      - "flake.lock"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Run flake check
        run: nix flake check
