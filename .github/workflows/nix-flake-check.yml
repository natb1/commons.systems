name: Nix Flake Check

on:
  push:
    branches-ignore:
      - main
    paths:
      - "nix/**"
      - "flake.nix"
      - "flake.lock"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Run flake check
        run: nix flake check
