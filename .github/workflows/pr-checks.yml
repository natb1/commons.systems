name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}
      - name: Run acceptance tests
        env:
          VITE_GITHUB_BRANCH: ${{ github.head_ref }}
        run: .claude/skills/ref-pr-workflow/scripts/run-all-acceptance-tests.sh

  preview-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      - name: Authenticate with Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: .github/scripts/firebase-auth.sh
      - name: Deploy Cloud Functions (if changed)
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^functions/'; then
            npm ci
            npm run -w functions build
            npx firebase-tools deploy --only functions --force --project "${{ secrets.FIREBASE_PROJECT_ID }}"
          fi
      - name: Deploy previews and run smoke tests
        id: deploy
        env:
          VITE_GITHUB_BRANCH: ${{ github.head_ref }}
        run: |
          set -o pipefail
          OUTPUT=$(.claude/skills/ref-pr-workflow/scripts/run-all-preview-deploy-smoke.sh "pr-${{ github.event.pull_request.number }}" | tee /dev/stderr)
          # Extract multi-line preview comment from output
          COMMENT=$(echo "$OUTPUT" | sed -n '/^PREVIEW_COMMENT<<EOF$/,/^EOF$/{ /^PREVIEW_COMMENT<<EOF$/d; /^EOF$/d; p; }')
          if [ -n "$COMMENT" ]; then
            echo "preview_comment<<EOF" >> "$GITHUB_OUTPUT"
            echo "$COMMENT" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
      - name: Comment preview URLs on PR
        if: success() && steps.deploy.outputs.preview_comment != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_COMMENT: ${{ steps.deploy.outputs.preview_comment }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "$PREVIEW_COMMENT"
      - name: Cleanup credentials
        if: always()
        run: .github/scripts/firebase-auth-cleanup.sh
