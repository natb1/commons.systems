name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: "temurin"
          java-version: "21"
      - name: Run acceptance tests
        env:
          VITE_GITHUB_BRANCH: ${{ github.head_ref }}
        run: .claude/skills/ref-pr-workflow/scripts/run-all-acceptance-tests.sh

  preview-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Authenticate with Firebase
        run: |
          CREDS_FILE=$(mktemp --suffix=.json)
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$CREDS_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS_FILE" >> "$GITHUB_ENV"
          echo "CREDS_FILE=$CREDS_FILE" >> "$GITHUB_ENV"
      - name: Deploy previews and run smoke tests
        id: deploy
        env:
          VITE_GITHUB_BRANCH: ${{ github.head_ref }}
        run: |
          set -o pipefail
          OUTPUT=$(.claude/skills/ref-pr-workflow/scripts/run-all-preview-deploy-smoke.sh "pr-${{ github.event.pull_request.number }}" | tee /dev/stderr)
          # Extract multi-line preview comment from output
          COMMENT=$(echo "$OUTPUT" | sed -n '/^PREVIEW_COMMENT<<EOF$/,/^EOF$/{ /^PREVIEW_COMMENT<<EOF$/d; /^EOF$/d; p; }')
          if [ -n "$COMMENT" ]; then
            echo "preview_comment<<EOF" >> "$GITHUB_OUTPUT"
            echo "$COMMENT" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
      - name: Comment preview URLs on PR
        if: success() && steps.deploy.outputs.preview_comment != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_COMMENT: ${{ steps.deploy.outputs.preview_comment }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "$PREVIEW_COMMENT"
      - name: Cleanup credentials
        if: always()
        run: rm -f "$CREDS_FILE"
