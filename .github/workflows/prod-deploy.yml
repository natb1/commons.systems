name: Production Deploy

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  deploy-and-smoke:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Authenticate with Firebase
        run: |
          CREDS_FILE=$(mktemp --suffix=.json)
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$CREDS_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS_FILE" >> "$GITHUB_ENV"
          echo "CREDS_FILE=$CREDS_FILE" >> "$GITHUB_ENV"
      - name: Deploy to production and run smoke tests
        env:
          GA_MEASUREMENT_ID_LANDING: ${{ secrets.GA_MEASUREMENT_ID_LANDING }}
          GA_MEASUREMENT_ID_BUDGET: ${{ secrets.GA_MEASUREMENT_ID_BUDGET }}
          GA_MEASUREMENT_ID_FELLSPIRAL: ${{ secrets.GA_MEASUREMENT_ID_FELLSPIRAL }}
          GA_MEASUREMENT_ID_PRINT: ${{ secrets.GA_MEASUREMENT_ID_PRINT }}
        run: .claude/skills/ref-pr-workflow/scripts/run-all-prod-deploy-smoke.sh
      - name: Cleanup credentials
        if: always()
        run: rm -f "$CREDS_FILE"

  deploy-functions:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: main
          fetch-depth: 0
      - name: Check for functions changes
        id: changes
        run: |
          if git diff --name-only HEAD~1...HEAD | grep -q '^functions/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: "22"
      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci
      - name: Build functions
        if: steps.changes.outputs.changed == 'true'
        run: npm run -w functions build
      - name: Authenticate with Firebase
        if: steps.changes.outputs.changed == 'true'
        run: |
          CREDS_FILE=$(mktemp --suffix=.json)
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$CREDS_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS_FILE" >> "$GITHUB_ENV"
          echo "CREDS_FILE=$CREDS_FILE" >> "$GITHUB_ENV"
      - name: Deploy functions
        if: steps.changes.outputs.changed == 'true'
        run: npx firebase-tools deploy --only functions --force --project "${{ secrets.FIREBASE_PROJECT_ID }}"
      - name: Cleanup credentials
        if: always() && steps.changes.outputs.changed == 'true'
        run: rm -f "$CREDS_FILE"

  cleanup-preview:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Authenticate with Firebase
        run: |
          CREDS_FILE=$(mktemp --suffix=.json)
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$CREDS_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS_FILE" >> "$GITHUB_ENV"
          echo "CREDS_FILE=$CREDS_FILE" >> "$GITHUB_ENV"
      - name: Cleanup preview resources
        run: .claude/skills/ref-pr-workflow/scripts/run-all-cleanup-preview.sh "${{ github.event.pull_request.number }}"
      - name: Cleanup credentials
        if: always()
        run: rm -f "$CREDS_FILE"
