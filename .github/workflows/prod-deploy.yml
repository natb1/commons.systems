name: Production Deploy

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
  push:
    branches: [main]
    paths-ignore:
      - ".claude/**"
      - ".github/**"
      - "nix/**"
      - "scaffolding/**"
      - "rules-test/**"
      - "*.md"
      - "*.nix"
      - "flake.lock"

permissions:
  contents: read

jobs:
  deploy-and-smoke:
    if: >-
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      - name: Authenticate with Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: .github/scripts/firebase-auth.sh
      - name: Deploy to production and run smoke tests
        env:
          GA_MEASUREMENT_ID_LANDING: ${{ secrets.GA_MEASUREMENT_ID_LANDING }}
          GA_MEASUREMENT_ID_BUDGET: ${{ secrets.GA_MEASUREMENT_ID_BUDGET }}
          GA_MEASUREMENT_ID_FELLSPIRAL: ${{ secrets.GA_MEASUREMENT_ID_FELLSPIRAL }}
          GA_MEASUREMENT_ID_PRINT: ${{ secrets.GA_MEASUREMENT_ID_PRINT }}
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEPLOY_ALL: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: .claude/skills/ref-pr-workflow/scripts/run-all-prod-deploy-smoke.sh
      - name: Cleanup credentials
        if: always()
        run: .github/scripts/firebase-auth-cleanup.sh

  cleanup-preview:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      - name: Authenticate with Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: .github/scripts/firebase-auth.sh
      - name: Cleanup preview resources
        run: .claude/skills/ref-pr-workflow/scripts/run-all-cleanup-preview.sh "${{ github.event.pull_request.number }}"
      - name: Cleanup credentials
        if: always()
        run: .github/scripts/firebase-auth-cleanup.sh
