name: Unit Tests & Lint

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Detect changed file categories
        id: changes
        run: .claude/skills/ref-pr-workflow/scripts/detect-changes.sh
      - name: Install nix (if nix files changed)
        if: steps.changes.outputs.nix == 'true'
        uses: DeterminateSystems/nix-installer-action@d96bc962e61b3049ce8128d03d57a1144fa96539 # main
      - name: Set up Java (if firestore.rules changed)
        if: steps.changes.outputs.rules == 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      - name: Run unit tests
        run: .claude/skills/ref-pr-workflow/scripts/run-unit-tests.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Detect changed file categories
        id: changes
        run: .claude/skills/ref-pr-workflow/scripts/detect-changes.sh
      - name: Install nix (if nix files changed)
        if: steps.changes.outputs.nix == 'true'
        uses: DeterminateSystems/nix-installer-action@d96bc962e61b3049ce8128d03d57a1144fa96539 # main
      - name: Set up Java (if firestore.rules changed)
        if: steps.changes.outputs.rules == 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      - name: Run lint
        run: .claude/skills/ref-pr-workflow/scripts/run-lint.sh

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      - name: Run typecheck
        run: .claude/skills/ref-pr-workflow/scripts/run-typecheck.sh

  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Run approve-workflow-commands hook tests
        run: .claude/hooks/test-approve-workflow-commands.sh
      - name: Run dispatch script tests
        run: .claude/skills/dispatch/scripts/test-dispatch-scripts.sh
      - name: Run worktree-remove hook tests
        run: .claude/hooks/test-worktree-remove.sh

  playwright-version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Detect changed file categories
        id: changes
        run: .claude/skills/ref-pr-workflow/scripts/detect-changes.sh
      - name: Install nix (only when flake or package-lock changed)
        if: steps.changes.outputs.nix == 'true' || steps.changes.outputs.playwright == 'true'
        uses: DeterminateSystems/nix-installer-action@d96bc962e61b3049ce8128d03d57a1144fa96539 # main
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.changes.outputs.nix == 'true' || steps.changes.outputs.playwright == 'true'
        with:
          node-version-file: .node-version
      - name: Install workspace dependencies
        if: steps.changes.outputs.nix == 'true' || steps.changes.outputs.playwright == 'true'
        run: npm ci
      - name: Verify nix playwright-driver chromium matches npm @playwright/test
        if: steps.changes.outputs.nix == 'true' || steps.changes.outputs.playwright == 'true'
        run: nix develop --command .github/scripts/check-playwright-version-sync.sh

  go-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Detect changed file categories
        id: changes
        run: .claude/skills/ref-pr-workflow/scripts/detect-changes.sh
      - name: Set up Go (if budget-etl changed)
        if: steps.changes.outputs.go == 'true'
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: budget-etl/go.mod
      - name: Run Go tests
        if: steps.changes.outputs.go == 'true'
        run: go test ./...
        working-directory: budget-etl
