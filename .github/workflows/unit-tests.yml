name: Unit Tests & Lint

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Detect changed file categories
        id: changes
        run: .claude/skills/ref-pr-workflow/scripts/detect-changes.sh
      - name: Install nix (if nix files changed)
        if: steps.changes.outputs.nix == 'true'
        uses: DeterminateSystems/nix-installer-action@d96bc962e61b3049ce8128d03d57a1144fa96539 # main
      - name: Set up Java (if firestore.rules changed)
        if: steps.changes.outputs.rules == 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      - name: Run unit tests
        run: .claude/skills/ref-pr-workflow/scripts/run-unit-tests.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Detect changed file categories
        id: changes
        run: .claude/skills/ref-pr-workflow/scripts/detect-changes.sh
      - name: Install nix (if nix files changed)
        if: steps.changes.outputs.nix == 'true'
        uses: DeterminateSystems/nix-installer-action@d96bc962e61b3049ce8128d03d57a1144fa96539 # main
      - name: Set up Java (if firestore.rules changed)
        if: steps.changes.outputs.rules == 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      - name: Run lint
        run: .claude/skills/ref-pr-workflow/scripts/run-lint.sh
