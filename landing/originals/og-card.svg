<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(224, 216, 200, 0.04)" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#1a1714"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text
    x="600" y="295"
    font-family="'IBM Plex Mono', ui-monospace, Menlo, Consolas, 'DejaVu Sans Mono', monospace"
    font-size="92"
    font-weight="700"
    letter-spacing="4.6"
    fill="#e8943a"
    text-anchor="middle"
    filter="url(#glow)"
  >COMMONS.SYSTEMS</text>

  <text
    x="600" y="385"
    font-family="'IBM Plex Mono', ui-monospace, Menlo, Consolas, 'DejaVu Sans Mono', monospace"
    font-size="36"
    font-weight="400"
    fill="#e0d8c8"
    text-anchor="middle"
    opacity="0.85"
  >Custom software you can understand</text>

  <line x1="540" y1="430" x2="660" y2="430" stroke="#e8943a" stroke-width="2" opacity="0.5"/>

  <text
    x="600" y="478"
    font-family="'IBM Plex Mono', ui-monospace, Menlo, Consolas, 'DejaVu Sans Mono', monospace"
    font-size="22"
    font-weight="400"
    fill="#8a7d6e"
    text-anchor="middle"
    letter-spacing="2"
  >OPEN-SOURCE · LOCAL-FIRST · FORK AND OWN</text>
</svg>
